version: "3.8"

# 本地开发用：只跑基础设施，应用层在本地运行
services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      - POSTGRES_DB=pingcha
      - POSTGRES_PASSWORD=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    volumes:
      - miniodata:/data

  bgutil-provider:
    image: brainicism/bgutil-ytdlp-pot-provider
    restart: unless-stopped
    environment:
      - TOKEN_TTL=3600
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTP_PROXY:-}
    volumes:
      - ./cookies:/cookies:ro
    ports:
      - "127.0.0.1:4416:4416"

volumes:
  pgdata:
  redisdata:
  miniodata:
